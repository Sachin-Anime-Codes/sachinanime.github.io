<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachinAnime | Secure Portal</title>
    <style>
        :root {
            --medusa-red: #da2131;
            --royal-gold: #ffcf4b;
            --dark-bg: #0a0a0a;
        }
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://raw.githubusercontent.com/Sachin-Anime-Codes/sachinanime.github.io/main/medusa.png'); /* Yahan apni image ka link dalo */
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--royal-gold);
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            margin: 100px auto;
            box-shadow: 0 0 20px var(--medusa-red);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--medusa-red);
            color: white;
            border-radius: 5px;
        }
        .btn {
            background: var(--medusa-red);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="glass-box" id="login-box">
        <h2>🔥 SACHIN ANIME 🔥</h2>
        <p>Accessing 5TB Secure Storage</p>
        <input type="email" id="email" placeholder="Enter Email">
        <button class="btn" onclick="requestOTP()">Get OTP</button>
        <div id="otp-area" style="display:none;">
            <input type="text" id="otp" placeholder="Enter 6-Digit OTP">
            <button class="btn" onclick="verifyLogin()">Unlock Dashboard</button>
        </div>
    </div>

    <script>
        async function requestOTP() {
            // Ye tumhare Termux server (localhost:8080) se connect karega
            const res = await fetch('http://localhost:8080/get-otp', {method: 'POST'});
            if(res.ok) {
                alert('Check Termux console for OTP!');
                document.getElementById('otp-area').style.display = 'block';
            }
        }
        // Verification logic yahan aayega
    </script>
</body>
</html>
